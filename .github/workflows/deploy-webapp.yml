name: Deploy Web App

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - src/**
      - requirements.txt
      - .github/workflows/deploy-webapp.yml

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build frontend
        working-directory: src/frontend
        run: |
          npm install
          npm run build

      - name: Prepare deployment package
        run: |
          rm -rf .deploy
          mkdir -p .deploy/src/api/static
          rsync -av ./ .deploy/ \
            --exclude '.deploy' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude 'tests' \
            --exclude 'notebooks' \
            --exclude 'data' \
            --exclude 'src/frontend/node_modules' \
            --exclude 'src/frontend/build'
          cp -r src/frontend/build/* .deploy/src/api/static/

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: .deploy
